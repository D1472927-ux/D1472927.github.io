{% extends "base.html" %}

{% block title %}註冊 — 線上算命系統{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4">
            <h2 class="text-gold text-center mb-4"><i class="bi bi-person-plus"></i> 註冊帳號</h2>

            <form method="POST" action="{{ url_for('auth.register') }}">
                <div class="mb-3">
                    <label for="username" class="form-label">帳號</label>
                    <input type="text" class="form-control bg-dark text-light border-secondary"
                           id="username" name="username" placeholder="請設定帳號" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">密碼</label>
                    <input type="password" class="form-control bg-dark text-light border-secondary"
                           id="password" name="password" placeholder="請設定密碼" required>
                </div>

                <div class="mb-3">
                    <label for="password_confirm" class="form-label">確認密碼</label>
                    <input type="password" class="form-control bg-dark text-light border-secondary"
                           id="password_confirm" name="password_confirm" placeholder="請再次輸入密碼" required>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-fortune">
                        <i class="bi bi-person-plus"></i> 註冊
                    </button>
                </div>
            </form>

            <hr style="border-color: rgba(218,165,32,0.3);">
            <p class="text-center text-muted mb-0">
                已有帳號？
                <a href="{{ url_for('auth.login_page') }}" class="text-gold">立即登入</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
