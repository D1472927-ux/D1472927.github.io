{% extends "base.html" %}

{% block title %}登入 — 線上算命系統{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4">
            <h2 class="text-gold text-center mb-4"><i class="bi bi-box-arrow-in-right"></i> 登入</h2>

            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="mb-3">
                    <label for="username" class="form-label">帳號</label>
                    <input type="text" class="form-control bg-dark text-light border-secondary"
                           id="username" name="username" placeholder="請輸入帳號" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">密碼</label>
                    <input type="password" class="form-control bg-dark text-light border-secondary"
                           id="password" name="password" placeholder="請輸入密碼" required>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-fortune">
                        <i class="bi bi-box-arrow-in-right"></i> 登入
                    </button>
                </div>
            </form>

            <hr style="border-color: rgba(218,165,32,0.3);">
            <p class="text-center text-muted mb-0">
                還沒有帳號？
                <a href="{{ url_for('auth.register_page') }}" class="text-gold">立即註冊</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
